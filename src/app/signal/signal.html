<div class="row">
    <div class="col-5">
        courseName = {{ courseName() }}
        courseDuration = {{ courseDuration()}}
    </div>
    <div class=" col-2">
        Roll: {{roll()}}
    </div>
    <div class=" col-4">
        Name: {{student().name}}
        <br>
        Age: {{ student().age}}
        <br>
        City: {{student().city}}
    </div>
</div>
<div class="row">
    <div class="col-4">
        {{cityList()}}
    </div>
    <div class="col-4">
        <button (click)="changeCourse()">Change Course</button>
    </div>
</div>
