<div class="bg-light d-flex align-items-center justify-content-center min-vh-100">
    <div class="card shadow-sm p-4" style="width: 100%; max-width: 480px;">
        <h5 class="card-title mb-4">User Form</h5>
        <form action="" #formData="ngForm">
            <div class="mb-3">
                <label for="id" class="form-label">ID:</label>
                <input type="text" [(ngModel)]="userObject.id" name="id" class="form-control" id="id"
                    placeholder="Id" />
            </div>
            <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" #name="ngModel" [(ngModel)]="userObject.name" name="name" required minlength="5"
                    class="form-control" id="name" placeholder="Jane Smith" />
                @if(name.touched || name.dirty){
                <div class="text-danger">
                    <!-- --{{name.errors | json}} -->
                    @if(name.errors?.['required']){
                    <span>THis is Required</span>
                    }@else if(name.errors?.['minlength'])
                    {
                    <span>Min 5 Char Needed</span>
                    }
                </div>
                }
            </div>

            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" [(ngModel)]="userObject.username" name="username" class="form-control" id="username"
                    placeholder="janesmith" />
            </div>

            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" [(ngModel)]="userObject.email" name="email" class="form-control" id="email"
                    placeholder="jane@example.com" />
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" [(ngModel)]="userObject.password" name="password" class="form-control"
                    id="password" placeholder="••••••••" />
            </div>
            <div class="row mb-3">
                <div class="col">
                    <label for="city" class="form-label">City</label>
                    <input type="text" class="form-control" id="city" name="city" placeholder="Cairo" />
                </div>
                <div class="col">
                    <label for="state" class="form-label">State</label>
                    <input type="text" class="form-control" id="state" name="state" placeholder="Cairo Gov." />
                </div>
            </div>
            <div class="d-flex gap-2 justify-content-end">
                <button type="reset" class="btn btn-outline-secondary" [disabled]="!formData.touched || !formData.dirty"
                    (click)="resetForm()">Reset</button>
                <button type="submit" [disabled]="formData.invalid" class="btn btn-primary"
                    (click)="submitForm(formData)">Submit</button>
            </div>
        </form>
    </div>
</div>
