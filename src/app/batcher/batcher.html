<table class="table table-hover table-bordered">
    <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Name</th>
            <th>Username</th>
            <th>Email</th>
            <!-- <th>City</th>
            <th>Company</th>
            <th>Website</th> -->
        </tr>
    </thead>
    <tbody>
        @for (user of usersList(); track user.id) {
        <tr>
            <td>{{ user.id }}</td>
            <td>{{ user.name }}</td>
            <td>{{ user.username }}</td>
            <td>{{ user.email }}</td>
            <!-- <td>{{ user.address.city }}</td>
            <td>{{ user.company.name }}</td>
            <td>{{ user.website }}</td> -->
        </tr>
        }
    </tbody>
</table>

<table class="table table-hover table-bordered">
    <thead class="table-dark">
        <tr>
            <th>userId</th>
            <th>id</th>
            <th>Title</th>
            <th>Completed</th>
        </tr>
    </thead>
    <tbody>
        @for (user of todosList(); track user.id) {
        <tr>
            <td>{{ user.userId }}</td>
            <td>{{ user.id }}</td>
            <td>{{ user.title }}</td>
            <td>{{ user.completed }}</td>
        </tr>
        }
    </tbody>
</table>
